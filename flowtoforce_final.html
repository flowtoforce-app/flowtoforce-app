<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowToForce V1 - Programme Musculation</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Space Mono', monospace;
            background-color: #000055;
            color: #ffffff;
            line-height: 1.8;
            font-size: 16px;
        }

        header {
            background-color: #000055;
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid #ffffff;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 44px;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 16px;
            opacity: 0.95;
        }

        nav {
            background-color: #000055;
            padding: 15px 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            overflow-x: auto;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 0 10px;
        }

        nav button {
            background-color: rgba(255,255,255,0.1);
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 10px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        nav button:hover,
        nav button.active {
            background-color: #ffffff;
            color: #000055;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 25px 15px;
        }

        .chapter {
            display: none;
        }

        .chapter.active {
            display: block;
        }

        .chapter-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .chapter-subtitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 20px;
            opacity: 0.9;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 15px;
        }

        .chapter-intro {
            font-size: 16px;
            color: rgba(255,255,255,0.95);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .seance {
            margin-bottom: 40px;
            padding: 0;
            border: 2px solid rgba(255,255,255,0.4);
            background-color: rgba(0,0,50,0.5);
        }

        .seance-header {
            background-color: rgba(255,255,255,0.15);
            padding: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }

        .seance-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .seance-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
        }

        @media (min-width: 768px) {
            .seance-meta {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .meta-item {
            border-left: 3px solid #ffffff;
            padding-left: 10px;
        }

        .meta-label {
            font-weight: bold;
            display: block;
            font-size: 14px;
            opacity: 0.8;
        }

        .seance-content {
            padding: 20px;
        }

        .conseil {
            background-color: rgba(255,255,255,0.1);
            padding: 18px;
            margin-bottom: 25px;
            border-left: 4px solid #ffffff;
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255,255,255,0.95);
        }

        .conseil-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 17px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: #ffffff;
            background-color: rgba(255,255,255,0.15);
            padding: 12px 15px;
            margin-bottom: 15px;
            border-left: 4px solid #ffffff;
            letter-spacing: 1px;
        }

        .section-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .exercice {
            margin-bottom: 18px;
            padding: 15px;
            background-color: rgba(255,255,255,0.08);
            border-left: 3px solid #ffffff;
        }

        .exercice-name {
            font-weight: bold;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .exercice-detail {
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 6px;
            line-height: 1.7;
        }

        .exercice-detail strong {
            font-weight: bold;
            color: #ffffff;
        }

        .exercice-reps {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            font-weight: bold;
            margin-top: 8px;
        }

        .message-content {
            font-size: 16px;
            color: rgba(255,255,255,0.95);
            line-height: 1.9;
            margin-bottom: 20px;
        }

        footer {
            background-color: rgba(0,0,50,0.8);
            color: #ffffff;
            text-align: center;
            padding: 25px 15px;
            margin-top: 40px;
            font-size: 14px;
            border-top: 2px solid rgba(255,255,255,0.3);
        }

        footer p {
            margin-bottom: 10px;
        }

        .version-selector {
            margin-bottom: 25px;
            text-align: center;
            padding: 20px;
            background-color: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .version-selector label {
            font-weight: bold;
            margin-right: 15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            display: block;
            margin-bottom: 15px;
        }

        .version-selector button {
            background-color: rgba(255,255,255,0.1);
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 12px 20px;
            margin: 0 10px;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }

        .version-selector button:hover,
        .version-selector button.active {
            background-color: #ffffff;
            color: #000055;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 36px;
            }

            .chapter-title {
                font-size: 32px;
            }

            .chapter-subtitle {
                font-size: 20px;
            }

            .seance-title {
                font-size: 24px;
            }

            .section-title {
                font-size: 18px;
            }

            nav ul {
                flex-direction: column;
                gap: 8px;
            }

            nav button {
                width: 100%;
            }

            .seance-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>FLOWTOFORCE</h1>
        <p>Programme de Musculation Progressive 12 Semaines En Salle</p>
    </header>

    <div class="container">
        <div class="version-selector">
            <label>Choisis ta version</label>
            <button class="version-btn active" data-version="v1">V1 En Salle</button>
            <button class="version-btn" data-version="v2">V2 Home</button>
        </div>
    </div>

    <nav>
        <ul id="chaptersNav"></ul>
    </nav>

    <div class="container" id="content"></div>

    <footer>
        <p>FlowToForce Programme créé par Lys</p>
        <p>Version Beta Test</p>
    </footer>

    <script>
        const data = {
            v1: {
                chapters: []
            },
            v2: {
                chapters: []
            }
        };

        let currentVersion = 'v1';

        function renderNav() {
            const nav = document.getElementById('chaptersNav');
            nav.innerHTML = '';
            if (data[currentVersion].chapters.length > 0) {
                data[currentVersion].chapters.forEach(chapter => {
                    const button = document.createElement('button');
                    button.className = 'chapter-nav-btn';
                    button.textContent = chapter.title;
                    button.onclick = () => showChapter(chapter.id);
                    nav.appendChild(button);
                });
            }
        }

        function showChapter(chapterId) {
            const content = document.getElementById('content');
            const chapter = data[currentVersion].chapters.find(c => c.id === chapterId);

            if (!chapter) return;

            let html = `<div class="chapter active">
                <h2 class="chapter-title">${chapter.title}</h2>`;
            
            if (chapter.subtitle) {
                html += `<div class="chapter-subtitle">${chapter.subtitle}</div>`;
            }
            
            if (chapter.intro) {
                html += `<div class="chapter-intro">${chapter.intro}</div>`;
            }

            if (chapter.seances && chapter.seances.length > 0) {
                chapter.seances.forEach(seance => {
                    html += renderSeance(seance);
                });
            }

            html += '</div>';
            content.innerHTML = html;

            document.querySelectorAll('.chapter-nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function renderSeance(seance) {
            let html = `<div class="seance">
                <div class="seance-header">
                    <div class="seance-title">${seance.name}</div>
                    <div class="seance-meta">
                        <div class="meta-item"><span class="meta-label">Semaines</span>${seance.weeks || ''}</div>
                        <div class="meta-item"><span class="meta-label">Phase</span>${seance.phase || ''}</div>
                        <div class="meta-item"><span class="meta-label">Durée</span>${seance.duration || ''}</div>
                        <div class="meta-item"><span class="meta-label">Pattern</span>${seance.pattern || ''}</div>
                    </div>
                </div>
                <div class="seance-content">`;

            if (seance.conseil) {
                html += `<div class="conseil">
                    <div class="conseil-title">Conseil de Lys</div>
                    <div>${seance.conseil}</div>
                </div>`;
            }

            if (seance.musclesEngages) {
                html += `<div class="section">
                    <div class="section-title">Muscles Sollicités Dans Cette Séance</div>
                    <div class="exercice-detail">${seance.musclesEngages}</div>
                </div>`;
            }

            if (seance.materiel) {
                html += `<div class="section">
                    <div class="section-title">Matériel</div>
                    <div class="exercice-detail">${seance.materiel}</div>
                </div>`;
            }

            if (seance.sections && seance.sections.length > 0) {
                seance.sections.forEach(section => {
                    html += `<div class="section">
                        <div class="section-title">${section.name}${section.duration ? ' ' + section.duration : ''}</div>`;
                    
                    if (section.note) {
                        html += `<div class="section-subtitle">${section.note}</div>`;
                    }

                    if (section.exercices && section.exercices.length > 0) {
                        section.exercices.forEach(exo => {
                            html += `<div class="exercice">
                                <div class="exercice-name">${exo.name}</div>`;
                            
                            if (exo.objectif) {
                                html += `<div class="exercice-detail"><strong>Objectif</strong> ${exo.objectif}</div>`;
                            }
                            
                            if (exo.muscles) {
                                html += `<div class="exercice-detail"><strong>Muscles Engagés</strong> ${exo.muscles}</div>`;
                            }
                            
                            if (exo.materiel) {
                                html += `<div class="exercice-detail"><strong>Matériel</strong> ${exo.materiel}</div>`;
                            }
                            
                            if (exo.reps) {
                                html += `<div class="exercice-reps">${exo.reps}</div>`;
                            }
                            
                            html += `</div>`;
                        });
                    }
                    
                    html += `</div>`;
                });
            }

            if (seance.messageContent) {
                html += `<div class="message-content">${seance.messageContent}</div>`;
            }

            html += `</div></div>`;
            return html;
        }

        document.querySelectorAll('.version-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentVersion = this.dataset.version;
                renderNav();
                if (data[currentVersion].chapters.length > 0) {
                    showChapter(data[currentVersion].chapters[0].id);
                }
            });
        });

        function initData() {
            renderNav();
            if (data[currentVersion].chapters.length > 0) {
                showChapter(data[currentVersion].chapters[0].id);
            }
        }

        initData();
    </script>
</body>
</html>
