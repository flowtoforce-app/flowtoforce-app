<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowToForce - Programme Musculation Complet</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Header */
        header {
            background-color: #000055;
            color: #ffffff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #000055;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Navigation */
        nav {
            background-color: #f8f8f8;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e0e0e0;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        nav button {
            background-color: #ffffff;
            border: 2px solid #000055;
            color: #000055;
            padding: 8px 16px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        nav button:hover {
            background-color: #000055;
            color: #ffffff;
        }

        nav button.active {
            background-color: #000055;
            color: #ffffff;
        }

        /* Main Content */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Chapters */
        .chapter {
            display: none;
            animation: fadeIn 0.3s;
        }

        .chapter.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .chapter-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: #000055;
            margin-bottom: 10px;
        }

        .chapter-intro {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        /* Seance */
        .seance {
            margin-bottom: 50px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }

        .seance-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: #ffffff;
            background-color: #000055;
            padding: 15px;
            margin: -20px -20px 20px -20px;
            border-radius: 4px 4px 0 0;
        }

        .seance-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .seance-meta span {
            background-color: #ffffff;
            padding: 8px 12px;
            border-left: 3px solid #000055;
            font-weight: bold;
        }

        /* Conseil de Lys */
        .conseil-lys {
            background-color: #f0f0ff;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #000055;
            border-radius: 4px;
            font-style: italic;
            font-size: 14px;
            line-height: 1.8;
        }

        .conseil-lys strong {
            display: block;
            color: #000055;
            font-style: normal;
            margin-bottom: 10px;
            font-family: 'Bebas Neue', sans-serif;
        }

        /* Sections */
        .section {
            margin-bottom: 25px;
        }

        .section-title {
            background-color: #ffffff;
            padding: 8px 12px;
            border-left: 3px solid #000055;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
        }

        .exercice-detail {
            font-size: 13px;
            margin-bottom: 10px;
            color: #333;
        }

        .exercice {
            margin-bottom: 15px;
            padding: 12px;
            background-color: #ffffff;
            border-left: 3px solid #000055;
        }

        .exercice-name {
            font-weight: bold;
            color: #000055;
            margin-bottom: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
        }

        .exercice-reps {
            color: #666;
            font-size: 12px;
            font-style: italic;
        }

        /* Footer */
        footer {
            background-color: #000055;
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
            margin-top: 50px;
            font-size: 12px;
        }

        footer p {
            margin-bottom: 10px;
        }

        /* Version selector */
        .version-selector {
            margin-bottom: 30px;
            text-align: center;
        }

        .version-selector label {
            font-weight: bold;
            margin-right: 15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
        }

        .version-selector button {
            background-color: #ffffff;
            border: 2px solid #000055;
            color: #000055;
            padding: 10px 20px;
            margin: 0 10px;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .version-selector button:hover,
        .version-selector button.active {
            background-color: #000055;
            color: #ffffff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            .chapter-title {
                font-size: 24px;
            }

            nav ul {
                flex-direction: column;
                gap: 5px;
            }

            nav button {
                width: 100%;
            }
        }
    </style>
</head>

        let currentVersion = 'v1';

        // Render chapters navigation
        function renderNav() {
            const nav = document.getElementById('chaptersNav');
            nav.innerHTML = '';
            data[currentVersion].chapters.forEach(chapter => {
                const button = document.createElement('button');
                button.className = 'chapter-nav-btn';
                button.textContent = chapter.title;
                button.onclick = () => showChapter(chapter.id);
                nav.appendChild(button);
            });
        }

        // Show chapter
        function showChapter(chapterId) {
            const content = document.getElementById('content');
            const chapter = data[currentVersion].chapters.find(c => c.id === chapterId);

            if (!chapter) return;

            let html = `
                <div class="chapter active">
                    <h2 class="chapter-title">${chapter.title}</h2>
                    <h3 style="font-family: 'Space Mono'; font-size: 18px; margin-bottom: 20px; color: #666;">${chapter.subtitle}</h3>
                    <div class="chapter-intro">${chapter.intro}</div>
            `;

            // Render seances
            if (chapter.seances && chapter.seances.length > 0) {
                chapter.seances.forEach(seance => {
                    html += renderSeance(seance);
                });
            }

            html += '</div>';
            content.innerHTML = html;

            // Update nav buttons
            document.querySelectorAll('.chapter-nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // Render seance
        function renderSeance(seance) {
            let html = `
                <div class="seance">
                    <div class="seance-title">
                        <span>${seance.name} - ${seance.pattern}</span>
                    </div>
                    <div class="seance-meta">
                        <span><strong>Durée:</strong> ${seance.duration}</span>
                        <span><strong>Phase:</strong> ${seance.phase}</span>
                        <span><strong>Semaines:</strong> ${seance.weeks}</span>
                    </div>
            `;

            if (seance.conseil) {
                html += `
                    <div class="conseil-lys">
                        <strong>💡 Le conseil de Lys</strong>
                        ${seance.conseil}
                    </div>
                `;
            }

            if (seance.musclesEngages) {
                html += `
                    <div class="section">
                        <div class="section-title">Muscles sollicités</div>
                        <div class="exercice-detail">${seance.musclesEngages}</div>
                    </div>
                `;
            }

            if (seance.materiel) {
                html += `
                    <div class="section">
                        <div class="section-title">Matériel</div>
                        <div class="exercice-detail">${seance.materiel}</div>
                    </div>
                `;
            }

            // Render sections
            if (seance.sections) {
                seance.sections.forEach(section => {
                    html += `<div class="section">
                        <div class="section-title">${section.name}${section.duration ? ' - ' + section.duration : ''}</div>
                        ${section.note ? `<div class="exercice-detail"><strong>${section.note}</strong></div>` : ''}
                    `;

                    section.exercices.forEach(exo => {
                        if (exo.objectif) {
                            // Full exercice detail
                            html += `
                                <div class="exercice">
                                    <div class="exercice-name">Exo ${exo.num} - ${exo.name}</div>
                                    <div class="exercice-detail"><strong>Objectif:</strong> ${exo.objectif}</div>
                                    <div class="exercice-detail"><strong>Muscles engagés:</strong> ${exo.muscles}</div>
                                    <div class="exercice-detail"><strong>Matériel:</strong> ${exo.materiel}</div>
                                    <div class="exercice-reps">${exo.reps}</div>
                                </div>
                            `;
                        } else {
                            // Simple exercice
                            html += `
                                <div class="exercice">
                                    <div class="exercice-name">${exo.name}</div>
                                    <div class="exercice-reps">${exo.reps}</div>
                                </div>
                            `;
                        }
                    });

                    html += '</div>';
                });
            }

            html += '</div>';
            return html;
        }

        // Version selector
        document.querySelectorAll('.version-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentVersion = this.dataset.version;
                renderNav();
                showChapter(data[currentVersion].chapters[0].id);
            });
        });
